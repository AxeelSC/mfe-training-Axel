<section class="app-grid-page">
  <header class="app-grid-header">
    <h1>Microfrontends Dashboard</h1>
    <p>Selecciona una aplicacion para cargarla desde la Shell.</p>
  </header>

  <div class="app-grid">
    <button class="app-card" type="button" (click)="goToCatalog()">
      <h2>Catalogo</h2>
      <p>Aplicacion remota de catalogo cargada en runtime.</p>
      <span>Entrar -></span>
    </button>

    <button class="app-card" type="button" (click)="goToReports()">
      <h2>Reportes</h2>
      <p>Aplicacion remota de reportes cargada en runtime.</p>
      <span>Entrar -></span>
    </button>
  </div>
</section>
